name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/giveth/thedaolog-app
  CADDY_IMAGE: ghcr.io/giveth/thedaolog-caddy

jobs:
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image-tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ steps.meta.outputs.image-tag }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Build and push Caddy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.caddy
          push: true
          build-args: |
            VITE_WALLETCONNECT_PROJECT_ID=${{ vars.VITE_WALLETCONNECT_PROJECT_ID || secrets.VITE_WALLETCONNECT_PROJECT_ID || '' }}
          tags: |
            ${{ env.CADDY_IMAGE }}:latest
            ${{ env.CADDY_IMAGE }}:${{ steps.meta.outputs.image-tag }}
          cache-from: type=gha,scope=caddy
          cache-to: type=gha,mode=max,scope=caddy

  deploy:
    name: Roll out on VPS
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: DEPLOY_PATH,GHCR_READ_TOKEN,GHCR_USERNAME,IMAGE_TAG
          script: |
            set -euo pipefail

            cd "$DEPLOY_PATH"

            if [ -d .git ]; then
              git fetch origin main
              git checkout main
              git pull --ff-only origin main
            fi

            if [ -n "${GHCR_READ_TOKEN:-}" ]; then
              echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            docker compose pull app caddy
            docker compose up -d --remove-orphans
            docker image prune -f
            docker compose ps
